
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | DNSHE</title>

    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-gradient: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0, transparent 50%), 
                           radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0, transparent 50%);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'PingFang SC', 'Inter', -apple-system, sans-serif;
            background-color: #f8fafc;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .bg-mesh {
            position: fixed; inset: 0; background: var(--bg-gradient); z-index: -1;
        }
        .bg-mesh::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; pointer-events: none;
        }

        .container {
            width: min(90%, 800px); padding: 3rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 12rem); font-weight: 800; line-height: 1;
            margin: 0; background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 15px rgba(14, 165, 233, 0.2));
            animation: float 5s ease-in-out infinite; user-select: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        h2 { color: var(--text-main); font-size: 1.8rem; margin-top: 1rem; }
        .desc { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2.5rem; max-width: 550px; margin-inline: auto; }

        .status-bar { margin-bottom: 2.5rem; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        #timer { color: var(--primary); font-weight: 700; }

        .progress-track { width: 200px; height: 4px; background: rgba(14, 165, 233, 0.1); border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 100%; background: var(--primary); animation: progressRun 10s linear forwards; }

        @keyframes progressRun { from { width: 100%; } to { width: 0%; } }

        .btn-group { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .btn { 
            padding: 14px 28px; border-radius: 14px; font-size: 1rem; font-weight: 600;
            text-decoration: none; transition: all 0.25s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4); }
        .btn-main:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-sub { color: var(--primary); border: 1.5px solid var(--primary); }
        .btn-sub:hover { background: rgba(14, 165, 233, 0.05); transform: translateY(-2px); }

        @media (max-width: 480px) {
            .container { padding: 2rem 1.5rem; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <div class="container">
        <h1 class="error-code">404</h1>
        
        <h2 id="ui-title">页面未找到</h2>
        <p class="desc">
            <span id="ui-desc">你访问的资源可能已被搬迁或删减，别担心。</span><br>
            <span id="ui-timer-box">我们将在 <span id="timer">10</span> 秒后带你回家。</span>
        </p>

        <div class="status-bar">
            <div class="progress-track">
                <div class="progress-bar"></div>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://my.dnshe.com/?404" class="btn btn-main" id="btn-home">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>返回首页</span>
            </a>
            <a href="https://my.dnshe.com/submitticket.php" class="btn btn-sub" id="btn-support">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <span>技术支持</span>
            </a>
        </div>
    </div>

    <script>
        const i18n = {
            zh: {
                title: "哎呀，页面走丢了",
                desc: "你访问的资源可能已被搬迁或删减，别担心。",
                timer: "我们将在 <span id='timer'>10</span> 秒后带你回家。",
                home: "返回客户中心",
                support: "获取技术支持"
            },
            en: {
                title: "Oops! Page Not Found",
                desc: "The page you are looking for might have been removed or is temporarily unavailable.",
                timer: "Redirecting to home in <span id='timer'>10</span> seconds.",
                home: "Client Center",
                support: "Technical Support"
            }
        };

        // 语言检测逻辑
        const userLang = navigator.language || navigator.userLanguage;
        const lang = userLang.toLowerCase().startsWith('zh') ? 'zh' : 'en';
        
        // 动态填充文字
        document.getElementById('ui-title').innerText = i18n[lang].title;
        document.getElementById('ui-desc').innerText = i18n[lang].desc;
        document.getElementById('ui-timer-box').innerHTML = i18n[lang].timer;
        document.getElementById('btn-home').querySelector('span').innerText = i18n[lang].home;
        document.getElementById('btn-support').querySelector('span').innerText = i18n[lang].support;

        // 倒计时逻辑
        let timeLeft = 10;
        const timerEl = () => document.getElementById('timer'); // 重新获取以防innerHTML覆盖
        
        const countdown = setInterval(() => {
            timeLeft--;
            if(timerEl()) timerEl().textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = "https://my.dnshe.com/?404";
            }
        }, 1000);
    </script>
</body>
</html>
