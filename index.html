<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>if(location.hostname.includes("pages.dev"))location.host="mydomains.quasvx.cc.cd"</script>
    <title>Quasvx Domains</title>
    <!-- El favicon se agregará dinámicamente según el dominio -->
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0f19;
            color: #f3f4f6;
            overflow: hidden;
        }
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .menu-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            background: rgba(17, 24, 39, 0.7);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            display: none;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #fff;
        }
        p {
            color: #9ca3af;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .btn-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .container {
            position: relative;
            z-index: 2;
            max-width: 650px;
            padding: 40px;
            background: rgba(17, 24, 39, 0.7);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }
        .container h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .container p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #9ca3af;
            margin: 0 0 24px 0;
        }
        .footer {
            font-size: 0.9rem;
            color: #4b5563;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 20px;
            font-family: monospace;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const hostname = window.location.hostname;
            let faviconHref = "";
            let pageTitle = "";
            let bodyHTML = "";
            let needsCanvas = false;

            if (hostname === "a1.bot.cd") {
                pageTitle = "A1.bot.cd";
                faviconHref = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%236d28d9'/%3E%3Ccircle cx='50' cy='50' r='30' fill='%23ffffff'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%233b82f6'/%3E%3C/svg%3E";
                needsCanvas = true;
                bodyHTML = `
                    <div class="container">
                        <h1>a1.bot.cd</h1>
                        <p>
                            This domain is hosted on <strong>DNSHE</strong> and managed by Quasvx.<br>
                            It is commonly used for APIs and backend services, and rarely for other miscellaneous projects.
                            www.dnshe.com
                        </p>
                        <div class="footer">
                            Thanks DNSHE.
                        </div>
                    </div>
                `;
            } else if (hostname === "eeuu.cc.cd") {
                pageTitle = "EEUU.cc.cd";
                faviconHref = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231e40af'/%3E%3Ccircle cx='50' cy='50' r='30' fill='%23ffffff'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%23dc2626'/%3E%3C/svg%3E";
                needsCanvas = true;
                bodyHTML = `
                    <div class="container">
                        <h1>EEUU.cc.cd</h1>
                        <p>
                            Despite its name, this domain is not affiliated with The United States. <br>
                            This domain is hosted on Cloudflare and is mostly used for subdomains, tests, APIs and more. Owned by Quasvx
                            www.dnshe.com, www.cloudflare.com
                        </p>
                        <div class="footer">
                            Thanks DNSHE and Cloudflare.
                        </div>
                    </div>
                `;
            } else if (hostname === "my.b4.cc.cd") {
                pageTitle = "B4.cc.cd";
                faviconHref = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2316a34a'/%3E%3Ccircle cx='50' cy='50' r='30' fill='%23ffffff'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%2316a34a'/%3E%3C/svg%3E";
                needsCanvas = true;
                bodyHTML = `
                    <div class="container">
                        <h1>b4.cc.cd</h1>
                        <p>
                            This domain is connected to <strong>Short.io</strong> for link shortening, managed by Quasvx.<br>
                            It provides fast and reliable URL shortening services.
                            www.dnshe.com, www.cloudflare.com, short.io
                        </p>
                        <div class="footer">
                            Thanks DNSHE, Cloudflare and Short.io.
                        </div>
                    </div>
                `;
            } else if (hostname === "quasvxdomains.pages.dev" || hostname === "localhost" || hostname === "127.0.0.1") {
                pageTitle = "Quasvx Domains";
                faviconHref = "/imgquasvx.jpeg";
                needsCanvas = true;
                bodyHTML = `
                    <div class="menu-container" id="menu" style="display: block;">
                        <h1>Domains Quasvx</h1>
                        <p>Select which Quasvx Domain you wanna see:</p>
                        <div class="btn-wrapper">
                            <a href="https://eeuu.cc.cd" class="btn">EEUU.cc.cd</a>
                            <a href="https://a1.bot.cd" class="btn">a1.bot.cd</a>
                            <a href="https://my.b4.cc.cd" class="btn">b4.cc.cd (Short.io)</a>
                        </div>
                    </div>
                `;
            }

            // Si hay contenido para mostrar
            if (bodyHTML) {
                // Cambiar favicon
                const link = document.createElement('link');
                link.rel = 'icon';
                link.href = faviconHref;
                document.head.appendChild(link);

                // Cambiar título
                document.title = pageTitle;

                // Reemplazar body
                document.body.innerHTML = bodyHTML;

                // Si necesita canvas
                if (needsCanvas) {
                    const canvas = document.createElement('canvas');
                    canvas.id = 'canvas-bg';
                    document.body.insertBefore(canvas, document.body.firstChild);
                    initCanvasAnimation();
                }
            }
        });

        function initCanvasAnimation() {
            const canvas = document.getElementById('canvas-bg');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            let points = [];
            const spacing = 45;
            const mouse = { x: -1000, y: -1000, radius: 160 };

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initGrid();
            }

            function initGrid() {
                points = [];
                for (let x = 0; x < canvas.width + spacing; x += spacing) {
                    for (let y = 0; y < canvas.height + spacing; y += spacing) {
                        points.push({ ox: x, oy: y, x: x, y: y });
                    }
                }
            }

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });

            window.addEventListener('mouseleave', () => {
                mouse.x = -1000;
                mouse.y = -1000;
            });

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                points.forEach(p => {
                    const dx = mouse.x - p.ox;
                    const dy = mouse.y - p.oy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    let targetX = p.ox;
                    let targetY = p.oy;

                    if (dist < mouse.radius) {
                        const force = (mouse.radius - dist) / mouse.radius;
                        targetX = p.ox - (dx / dist) * force * 40;
                        targetY = p.oy - (dy / dist) * force * 40;
                    }

                    p.x += (targetX - p.x) * 0.08;
                    p.y += (targetY - p.y) * 0.08;
                });

                ctx.strokeStyle = 'rgba(59, 130, 246, 0.08)';
                ctx.lineWidth = 1;
                const rows = Math.ceil((canvas.height + spacing) / spacing);

                for (let i = 0; i < points.length; i++) {
                    const nextCol = i + rows;
                    const nextRow = i + 1;

                    if (nextCol < points.length && points[i].ox < points[nextCol].ox) {
                        ctx.beginPath();
                        ctx.moveTo(points[i].x, points[i].y);
                        ctx.lineTo(points[nextCol].x, points[nextCol].y);
                        ctx.stroke();
                    }
                    if (nextRow < points.length && (i % rows) < rows - 1) {
                        ctx.beginPath();
                        ctx.moveTo(points[i].x, points[i].y);
                        ctx.lineTo(points[nextRow].x, points[nextRow].y);
                        ctx.stroke();
                    }
                }

                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            resize();
            animate();
        }
    </script>
</head>
<body>
    <!-- El contenido se inyecta dinámicamente -->
</body>
</html>
